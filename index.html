<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tevus — Usage & Analytics Platform (Paper Wireframe)</title>
<meta name="description" content="Paper-wireframe skin of the Tavus usage & analytics prototype. Same screens, same data, sketched.">
<meta name="theme-color" content="#e8e3d6">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect x='1' y='1' width='30' height='30' rx='5' fill='%23fbf9f3' stroke='%232b2b2b' stroke-width='2'/%3E%3Ccircle cx='16' cy='16' r='6' fill='none' stroke='%232b2b2b' stroke-width='2.5'/%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Architects+Daughter&family=Kalam:wght@300;400;700&family=Cutive+Mono&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/styles.css">
<!-- db.js is generated from data/*.json by build.py so the demo runs offline (double-click). -->
<script src="assets/db.js"></script>
<script defer src="assets/app.js"></script>
</head>
<body>
<!-- Sketch primitives referenced by styles.css: #rough gives a chart's trend line and
     the schema-canvas relationship lines a freehand wobble, #hatch shades a filled
     area. They live here so the CSS can point at them by id — the skin is carried
     entirely by styles.css, never by the markup app.js emits. -->
<svg class="sketch-defs" width="0" height="0" aria-hidden="true" focusable="false">
  <defs>
    <filter id="rough" x="-6%" y="-14%" width="112%" height="128%">
      <feTurbulence type="fractalNoise" baseFrequency="0.022" numOctaves="3" seed="7" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="2.6" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
    <pattern id="hatch" width="7" height="7" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="7" stroke="#6b6a66" stroke-width="1.2" stroke-opacity=".4"/>
    </pattern>
  </defs>
</svg>
<div id="app"></div>
</body>
</html>
